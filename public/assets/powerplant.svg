<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 128" width="192" height="128">
  <!-- Sky background -->
  <rect width="192" height="128" fill="#87CEEB"/>

  <!-- Ground -->
  <rect x="0" y="100" width="192" height="28" fill="#5a8a3c"/>
  <rect x="0" y="100" width="192" height="6" fill="#6ea84a"/>

  <!-- Concrete base platform -->
  <rect x="30" y="82" width="132" height="22" fill="#9e9e9e"/>
  <rect x="30" y="82" width="132" height="4" fill="#b8b8b8"/>

  <!-- Main building body -->
  <rect x="60" y="60" width="72" height="24" fill="#757575"/>
  <rect x="60" y="60" width="72" height="5" fill="#8a8a8a"/>

  <!-- Warning stripes on building -->
  <rect x="60" y="72" width="12" height="12" fill="#f5a623"/>
  <rect x="84" y="72" width="12" height="12" fill="#f5a623"/>
  <rect x="108" y="72" width="12" height="12" fill="#f5a623"/>
  <rect x="132" y="72" width="12" height="12" fill="#f5a623"/>

  <!-- Left cooling tower (trapezoid shape) -->
  <!-- Tower body -->
  <polygon points="52,82 28,82 18,20 62,20" fill="#bdbdbd"/>
  <!-- Tower inner shadow -->
  <polygon points="52,82 28,82 18,20 62,20" fill="none" stroke="#9e9e9e" stroke-width="2"/>
  <!-- Tower top opening -->
  <ellipse cx="40" cy="20" rx="22" ry="5" fill="#9e9e9e"/>
  <!-- Tower inner dark -->
  <ellipse cx="40" cy="20" rx="14" ry="3" fill="#616161"/>
  <!-- Red warning light left -->
  <circle cx="40" cy="16" r="3" fill="#e53935"/>
  <circle cx="40" cy="16" r="1.5" fill="#ff6b6b"/>

  <!-- Right cooling tower (trapezoid shape) -->
  <polygon points="140,82 164,82 174,20 130,20" fill="#bdbdbd"/>
  <polygon points="140,82 164,82 174,20 130,20" fill="none" stroke="#9e9e9e" stroke-width="2"/>
  <ellipse cx="152" cy="20" rx="22" ry="5" fill="#9e9e9e"/>
  <ellipse cx="152" cy="20" rx="14" ry="3" fill="#616161"/>
  <!-- Red warning light right -->
  <circle cx="152" cy="16" r="3" fill="#e53935"/>
  <circle cx="152" cy="16" r="1.5" fill="#ff6b6b"/>

  <!-- Steam/smoke puffs left tower -->
  <circle cx="33" cy="10" r="7" fill="white" opacity="0.85"/>
  <circle cx="42" cy="6" r="9" fill="white" opacity="0.75"/>
  <circle cx="50" cy="9" r="6" fill="white" opacity="0.7"/>
  <circle cx="38" cy="2" r="5" fill="white" opacity="0.6"/>

  <!-- Steam/smoke puffs right tower -->
  <circle cx="145" cy="10" r="7" fill="white" opacity="0.85"/>
  <circle cx="154" cy="6" r="9" fill="white" opacity="0.75"/>
  <circle cx="162" cy="9" r="6" fill="white" opacity="0.7"/>
  <circle cx="150" cy="2" r="5" fill="white" opacity="0.6"/>

  <!-- Power transmission lines -->
  <line x1="96" y1="60" x2="96" y2="35" stroke="#424242" stroke-width="2"/>
  <line x1="76" y1="35" x2="116" y2="35" stroke="#424242" stroke-width="2"/>
  <line x1="76" y1="35" x2="60" y2="48" stroke="#424242" stroke-width="1.5"/>
  <line x1="116" y1="35" x2="132" y2="48" stroke="#424242" stroke-width="1.5"/>
  <!-- Insulators -->
  <circle cx="76" cy="35" r="2.5" fill="#757575"/>
  <circle cx="116" cy="35" r="2.5" fill="#757575"/>

  <!-- Building door -->
  <rect x="88" y="72" width="16" height="12" rx="2" fill="#424242"/>
  <rect x="90" y="74" width="6" height="9" fill="#616161"/>

  <!-- Building windows -->
  <rect x="66" y="65" width="8" height="6" rx="1" fill="#90CAF9"/>
  <rect x="78" y="65" width="8" height="6" rx="1" fill="#90CAF9"/>
  <rect x="106" y="65" width="8" height="6" rx="1" fill="#90CAF9"/>
  <rect x="118" y="65" width="8" height="6" rx="1" fill="#90CAF9"/>

  <!-- Lightning bolt emblem on building -->
  <polygon points="96,64 92,71 95,71 91,78 99,70 96,70" fill="#FFD600"/>

  <!-- Label -->
  <rect x="55" y="103" width="82" height="14" rx="3" fill="#424242" opacity="0.75"/>
  <text x="96" y="113" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">תחנת כוח</text>
</svg>
